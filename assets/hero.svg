<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="850" height="220" fill="none" role="img" aria-label="Hemnaath — AI / ML Engineer, LLM and agentic systems">
  <defs>
    <style>
      .name { font: 400 66px Georgia, "Times New Roman", "Iowan Old Style", serif; }
      .kick { font: 600 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; letter-spacing:3px; }
      .sub  { font: 500 14px ui-monospace, "SF Mono", Menlo, Consolas, monospace; letter-spacing:2.5px; }
      .date { font: 500 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; letter-spacing:1.5px; }
    </style>
  </defs>

  <!-- paper -->
  <rect width="850" height="220" fill="#f3ede1"/>
  <!-- double rule border (print box) -->
  <rect x="10.5" y="10.5" width="829" height="199" fill="none" stroke="#1c1a15" stroke-width="1.5"/>
  <rect x="15.5" y="15.5" width="819" height="189" fill="none" stroke="#1c1a15" stroke-width="0.6"/>

  <!-- top dateline -->
  <text x="34" y="42" class="kick" fill="#6f6a5c">HEMNAATH.TECH &#160;·&#160; @HEMNAATH04</text>
  <text x="816" y="42" class="kick" fill="#6f6a5c" text-anchor="end">EST. MMXXVI</text>
  <path d="M34 54 H816" stroke="#cbc3b2" stroke-width="1" stroke-dasharray="782" stroke-dashoffset="782">
    <animate attributeName="stroke-dashoffset" values="782;0" dur="0.9s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.2 1" keyTimes="0;1"/>
  </path>

  <!-- masthead name -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.7s" begin="0.35s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="0 9;0 0" dur="0.7s" begin="0.35s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.2 1" keyTimes="0;1"/>
    <text x="32" y="130" class="name" fill="#1c1a15">Hemnaath</text>
  </g>

  <!-- rule + red accent tick under name -->
  <path d="M34 150 H816" stroke="#1c1a15" stroke-width="1.6" stroke-dasharray="782" stroke-dashoffset="782">
    <animate attributeName="stroke-dashoffset" values="782;0" dur="1s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.2 0.7 0.2 1" keyTimes="0;1"/>
  </path>
  <rect x="34" y="148.5" width="64" height="3" fill="#8f2d24" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.4s" begin="1.5s" fill="freeze"/>
  </rect>

  <!-- subhead -->
  <text x="34" y="178" class="sub" fill="#3a372f" opacity="0">AI / ML ENGINEER &#160;&#8212;&#160; LLM &amp; AGENTIC SYSTEMS
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.0s" fill="freeze"/>
  </text>

  <!-- bottom dateline -->
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.3s" fill="freeze"/>
    <text x="34" y="197" class="date" fill="#6f6a5c">BOSTON, MA &#160;&#160;·&#160;&#160; CS MS @ NORTHEASTERN &#160;&#160;·&#160;&#160; <tspan fill="#8f2d24">OPEN FOR CO-OP, JAN 2027</tspan></text>
  </g>
</svg>
