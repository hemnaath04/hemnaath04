<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 220" width="850" height="220" fill="none" role="img" aria-label="Hemnaath — AI / ML Engineer">
  <defs>
    <linearGradient id="kiwi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#CCFF00"/>
      <stop offset="0.5" stop-color="#FFFF00"/>
      <stop offset="1" stop-color="#DFFF00"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="reveal">
      <rect x="34" y="118" width="0" height="34">
        <animate attributeName="width" values="0;520" dur="2.4s" begin="0.6s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <style>
      .name { font: 800 66px ui-sans-serif, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; letter-spacing:2px; }
      .tag  { font: 600 20px ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace; letter-spacing:1px; }
      .meta { font: 500 14px ui-monospace, "SF Mono", Menlo, Consolas, monospace; letter-spacing:.5px; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="850" height="220" rx="14" fill="#050505"/>
  <rect x="0.5" y="0.5" width="849" height="219" rx="14" fill="none" stroke="#CCFF00" stroke-opacity="0.18"/>

  <!-- faint grid -->
  <g stroke="#CCFF00" stroke-opacity="0.05">
    <path d="M0 55 H850 M0 110 H850 M0 165 H850"/>
    <path d="M142 0 V220 M284 0 V220 M426 0 V220 M568 0 V220 M710 0 V220"/>
  </g>

  <!-- moving scanline -->
  <rect x="0" width="850" height="2" fill="#CCFF00" opacity="0.10">
    <animate attributeName="y" values="0;220;0" dur="7s" repeatCount="indefinite" calcMode="linear"/>
  </rect>

  <!-- corner brackets -->
  <g stroke="url(#kiwi)" stroke-width="2" fill="none">
    <path d="M18 40 V18 H40"/><path d="M810 18 H832 V40"/>
    <path d="M18 180 V202 H40"/><path d="M810 202 H832 V180"/>
  </g>

  <!-- name -->
  <g filter="url(#glow)">
    <text x="36" y="92" class="name" fill="url(#kiwi)">
      HEMNAATH
      <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
    </text>
  </g>

  <!-- typewriter tagline -->
  <text x="36" y="144" class="tag" fill="#F5F5F5" clip-path="url(#reveal)">AI / ML ENGINEER · LLM &amp; AGENTIC SYSTEMS</text>
  <!-- blinking cursor riding the reveal edge -->
  <rect y="122" width="11" height="26" fill="#CCFF00">
    <animate attributeName="x" values="36;554" dur="2.4s" begin="0.6s" fill="freeze" calcMode="linear"/>
    <animate attributeName="opacity" values="1;1;0;0" dur="0.9s" repeatCount="indefinite" calcMode="discrete"/>
  </rect>

  <!-- animated underline -->
  <path d="M36 168 H560" stroke="url(#kiwi)" stroke-width="2.5" stroke-dasharray="524" stroke-dashoffset="524">
    <animate attributeName="stroke-dashoffset" values="524;0" dur="1.1s" begin="0.3s" fill="freeze"/>
  </path>

  <!-- status line -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="3s" fill="freeze"/>
    <circle cx="42" cy="192" r="5" fill="#CCFF00">
      <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="56" y="197" class="meta" fill="#9aa0a6">OPEN FOR CO-OP · JAN 2027 &#160;&#160;//&#160;&#160; BOSTON, MA &#160;&#160;//&#160;&#160; CS MS @ NORTHEASTERN</text>
  </g>
</svg>
