<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 350" width="850" height="350" fill="none" role="img" aria-label="Skill proficiency and 2026 GitHub activity: 337 contributions, 207 commits, 9 public repos, 4 shipped projects">
  <defs>
    <style>
      .fig  { font: 600 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace; letter-spacing:3px; }
      .hd   { font: 600 11px ui-monospace, Menlo, Consolas, monospace; letter-spacing:2px; }
      .lbl  { font: 500 13px ui-monospace, Menlo, Consolas, monospace; letter-spacing:.5px; }
      .val  { font: 700 13px ui-monospace, Menlo, Consolas, monospace; }
      .cap  { font: 600 11px ui-monospace, Menlo, Consolas, monospace; letter-spacing:2px; }
      .num  { font: 400 40px Georgia, "Times New Roman", serif; }
      .note { font: italic 400 14px Georgia, "Times New Roman", serif; }
    </style>
  </defs>

  <!-- paper + double rule border -->
  <rect width="850" height="350" fill="#f3ede1"/>
  <rect x="10.5" y="10.5" width="829" height="329" fill="none" stroke="#1c1a15" stroke-width="1.5"/>
  <rect x="15.5" y="15.5" width="819" height="319" fill="none" stroke="#1c1a15" stroke-width="0.6"/>

  <!-- figure caption -->
  <text x="34" y="42" class="fig" fill="#1c1a15">FIG. 1 &#8212; SKILL PROFICIENCY &amp; 2026 ACTIVITY</text>
  <text x="816" y="42" class="hd" fill="#6f6a5c" text-anchor="end">SOURCE: GITHUB API</text>
  <path d="M34 54 H816" stroke="#1c1a15" stroke-width="1.2" stroke-dasharray="782" stroke-dashoffset="782">
    <animate attributeName="stroke-dashoffset" values="782;0" dur="0.9s" begin="0.15s" fill="freeze"/>
  </path>

  <!-- vertical divider -->
  <line x1="452" y1="66" x2="452" y2="292" stroke="#cbc3b2" stroke-width="1"/>

  <!-- ===== left: skills table ===== -->
  <text x="34" y="82" class="hd" fill="#6f6a5c">SKILL</text>
  <text x="414" y="82" class="hd" fill="#6f6a5c" text-anchor="end">LEVEL</text>
  <line x1="34" y1="90" x2="414" y2="90" stroke="#cbc3b2" stroke-width="0.8"/>

  <!-- Python 92 -->
  <text x="34" y="122" class="lbl" fill="#1c1a15">PYTHON</text>
  <rect x="180" y="114" width="234" height="6" fill="#e3dccb"/>
  <rect x="180" y="114" width="0" height="6" fill="#1c1a15"><animate attributeName="width" values="0;215" dur="1s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.2 0.75 0.2 1" keyTimes="0;1"/></rect>
  <text x="414" y="122" class="val" fill="#1c1a15" text-anchor="end">92</text>

  <!-- LLM & Agents 88 -->
  <text x="34" y="168" class="lbl" fill="#1c1a15">LLM &amp; AGENTS</text>
  <rect x="180" y="160" width="234" height="6" fill="#e3dccb"/>
  <rect x="180" y="160" width="0" height="6" fill="#1c1a15"><animate attributeName="width" values="0;206" dur="1s" begin="0.42s" fill="freeze" calcMode="spline" keySplines="0.2 0.75 0.2 1" keyTimes="0;1"/></rect>
  <text x="414" y="168" class="val" fill="#1c1a15" text-anchor="end">88</text>

  <!-- Backend / APIs 82 -->
  <text x="34" y="214" class="lbl" fill="#1c1a15">BACKEND &#183; APIs</text>
  <rect x="180" y="206" width="234" height="6" fill="#e3dccb"/>
  <rect x="180" y="206" width="0" height="6" fill="#1c1a15"><animate attributeName="width" values="0;192" dur="1s" begin="0.54s" fill="freeze" calcMode="spline" keySplines="0.2 0.75 0.2 1" keyTimes="0;1"/></rect>
  <text x="414" y="214" class="val" fill="#1c1a15" text-anchor="end">82</text>

  <!-- Infra / DevOps 72 -->
  <text x="34" y="260" class="lbl" fill="#1c1a15">INFRA &#183; DEVOPS</text>
  <rect x="180" y="252" width="234" height="6" fill="#e3dccb"/>
  <rect x="180" y="252" width="0" height="6" fill="#1c1a15"><animate attributeName="width" values="0;168" dur="1s" begin="0.66s" fill="freeze" calcMode="spline" keySplines="0.2 0.75 0.2 1" keyTimes="0;1"/></rect>
  <text x="414" y="260" class="val" fill="#1c1a15" text-anchor="end">72</text>

  <!-- ===== right: season 2026 ===== -->
  <text x="484" y="82" class="hd" fill="#6f6a5c">SEASON &#183; 2026</text>
  <rect x="484" y="88" width="42" height="2.5" fill="#8f2d24"/>

  <g fill="#1c1a15">
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.5s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 8;0 0" dur="0.5s" begin="0.5s" fill="freeze"/>
      <text x="484" y="140" class="num">337</text>
      <text x="484" y="160" class="cap" fill="#6f6a5c">CONTRIBUTIONS</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.68s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 8;0 0" dur="0.5s" begin="0.68s" fill="freeze"/>
      <text x="662" y="140" class="num">207</text>
      <text x="662" y="160" class="cap" fill="#6f6a5c">COMMITS</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.86s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 8;0 0" dur="0.5s" begin="0.86s" fill="freeze"/>
      <text x="484" y="222" class="num">9</text>
      <text x="484" y="242" class="cap" fill="#6f6a5c">PUBLIC REPOS</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.04s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" values="0 8;0 0" dur="0.5s" begin="1.04s" fill="freeze"/>
      <text x="662" y="222" class="num" fill="#8f2d24">4</text>
      <text x="662" y="242" class="cap" fill="#6f6a5c">SHIPPED PROJECTS</text>
    </g>
  </g>

  <!-- ===== footer ===== -->
  <path d="M34 302 H816" stroke="#1c1a15" stroke-width="1.2" stroke-dasharray="782" stroke-dashoffset="782">
    <animate attributeName="stroke-dashoffset" values="782;0" dur="1s" begin="1.1s" fill="freeze"/>
  </path>
  <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.4s" fill="freeze"/>
    <text x="34" y="326" class="hd" fill="#6f6a5c">AWARDS</text>
    <rect x="112" y="318" width="6" height="6" fill="#8f2d24"/>
    <text x="126" y="326" class="lbl" fill="#1c1a15">Pull Shark &#160;·&#160; Quickdraw &#160;·&#160; YOLO</text>
    <text x="816" y="326" class="note" fill="#3a372f" text-anchor="end">Next &#8212; a production LLM product, with real users.</text>
  </g>
</svg>
